name: Sync Upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Upstream branch to merge"
        required: false
        default: "master"
      target_branch:
        description: "Branch in this fork to update"
        required: false
        default: "master"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || 'master' }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync From Upstream + Apply Customizations
        env:
          UPSTREAM_URL: https://github.com/HappyStarfish/Accessibility-mod-template.git
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'master' }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'master' }}
        run: |
          set -Eeuo pipefail

          log_sync() {
            printf '[sync] %s\n' "$*"
          }

          log_customize() {
            printf '[customize] %s\n' "$*"
          }

          cleanup_on_error() {
            local exit_code=$?
            if git rev-parse -q --verify MERGE_HEAD >/dev/null 2>&1; then
              log_sync "Error encountered. Aborting in-progress merge to keep repo clean."
              git merge --abort >/dev/null 2>&1 || true
            fi
            exit "$exit_code"
          }

          trap cleanup_on_error ERR

          normalize_path() {
            local path="$1"
            path="${path//\\//}"
            while [[ "$path" == ./* ]]; do
              path="${path#./}"
            done
            printf '%s\n' "$path"
          }

          is_skipped_path() {
            local path
            path="$(normalize_path "$1")"
            [[ "$path" =~ (^|/)(\.git|\.github|\.vs|\.vscode|scripts|bin|obj|decompiled|packages|node_modules)(/|$) ]]
          }

          is_binary_file() {
            local path="$1"
            [[ -f "$path" ]] || return 1
            if perl -e 'use strict; use warnings; my $path = shift; open my $fh, "<", $path or exit 2; binmode $fh; read $fh, my $buf, 4096; exit(index($buf, "\0") >= 0 ? 0 : 1);' "$path"; then
              return 0
            fi
            return 1
          }

          has_conflict_markers() {
            local path="$1"
            if perl -0ne 'exit 0 if /^<<<<<<< /m && /^=======$/m && /^>>>>>>> /m; END { exit 1 }' "$path"; then
              return 0
            fi
            return 1
          }

          has_legacy_terms() {
            local path="$1"
            if perl -0ne 'exit 0 if /CLAUDE\.md/i || /AENTS\.md/i || /\bClaude\s+Code\b/i || /\bClaude\b/i; END { exit 1 }' "$path"; then
              return 0
            fi
            return 1
          }

          replace_terms_in_file() {
            local path="$1"
            local tmp
            tmp="$(mktemp)"
            perl -0pe 's/CLAUDE\.md/AGENTS.md/ig; s/AENTS\.md/AGENTS.md/ig; s/\bClaude\s+Code\b/Codex/ig; s/\bClaude\b/Codex/ig;' "$path" > "$tmp"
            if ! cmp -s "$path" "$tmp"; then
              mv "$tmp" "$path"
              log_customize "Updated text replacements in: $path"
              return 0
            fi
            rm -f "$tmp"
            return 1
          }

          ensure_fork_note() {
            local readme_path="$1"
            [[ -f "$readme_path" ]] || return 1

            local tmp
            local note
            tmp="$(mktemp)"
            note=$'<!-- fork-note:start -->\n## Fork Note\n\nThis repository is a fork of [HappyStarfish/Accessibility-mod-template](https://github.com/HappyStarfish/Accessibility-mod-template).\n\nIn this fork, assistant naming was normalized to Codex, and agent-file references were normalized to `AGENTS.md` so Codex can follow the guides more reliably.\n\nI tested this modified template with GPT-5.3 Codex (the latest OpenAI model available at the time of testing), and it worked very well in practice. I hope this helps people who need larger usage limits.\n\nHuge thanks to **Plueschyoda** for creating the original template.\n<!-- fork-note:end -->\n'
            FORK_NOTE_CONTENT="$note" perl -0pe 'my $note = $ENV{FORK_NOTE_CONTENT}; my $legacy = qr/^## Fork Note\s*\R.*?^Huge thanks to \*\*Plueschyoda\*\* for creating the original template\.\s*\R?/ms; if (s/<!-- fork-note:start -->.*?<!-- fork-note:end -->(?:\R)*/$note/ms) { } elsif (s/$legacy/$note/ms) { } else { s/^(# .+?\R)/$1\R$note/ms; }' "$readme_path" > "$tmp"

            if ! cmp -s "$readme_path" "$tmp"; then
              mv "$tmp" "$readme_path"
              log_customize "Ensured fork note in: $readme_path"
              return 0
            fi

            rm -f "$tmp"
            return 1
          }

          assert_repo_safety() {
            local template_agents="Accessibility-Mod-Template/AGENTS.md"
            local template_claude="Accessibility-Mod-Template/CLAUDE.md"
            local inspection=("$template_agents")
            local path

            [[ -f "$template_agents" ]] || {
              printf 'Safety check failed: missing %s\n' "$template_agents" >&2
              exit 1
            }

            [[ ! -f "$template_claude" ]] || {
              printf 'Safety check failed: %s still exists after customization\n' "$template_claude" >&2
              exit 1
            }

            if git check-ignore -q -- "$template_agents"; then
              printf 'Safety check failed: %s is ignored by .gitignore\n' "$template_agents" >&2
              exit 1
            fi

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              printf 'Safety check failed: legacy agent filename remains: %s\n' "${path#./}" >&2
              exit 1
            done < <(find . \
              \( -path './.git' -o -path './.github' -o -path './.vs' -o -path './.vscode' -o -path './scripts' -o -path './bin' -o -path './obj' -o -path './decompiled' -o -path './packages' -o -path './node_modules' \) -prune \
              -o -type f \( -iname 'CLAUDE.md' -o -iname 'AENTS.md' \) -print)

            for path in "$@"; do
              [[ -n "$path" ]] && inspection+=("$path")
            done

            mapfile -t inspection < <(printf '%s\n' "${inspection[@]}" | sed '/^$/d' | sort -u)
            for path in "${inspection[@]}"; do
              [[ -f "$path" ]] || continue
              if is_binary_file "$path"; then
                continue
              fi
              if has_conflict_markers "$path"; then
                printf 'Safety check failed: unresolved merge markers detected in %s\n' "$path" >&2
                exit 1
              fi
              if has_legacy_terms "$path"; then
                printf 'Safety check failed: residual legacy terms detected in %s\n' "$path" >&2
                exit 1
              fi
            done
          }

          resolve_known_merge_conflicts() {
            local path
            local unsupported=()

            mapfile -t unmerged < <(git diff --name-only --diff-filter=U | sed '/^$/d')
            if (( ${#unmerged[@]} == 0 )); then
              cat /tmp/sync-merge.log >&2 || true
              printf 'git merge failed before conflict resolution could proceed.\n' >&2
              exit 1
            fi

            for path in "${unmerged[@]}"; do
              if [[ ! "$path" =~ ^README\.md$ && ! "$path" =~ ^Accessibility-Mod-Template/ ]]; then
                unsupported+=("$path")
              fi
            done

            if (( ${#unsupported[@]} > 0 )); then
              printf 'Merge conflict requires manual resolution: %s\n' "$(IFS=', '; echo "${unsupported[*]}")" >&2
              exit 1
            fi

            log_sync "Auto-resolving known conflict path(s) by taking upstream version, then reapplying customizations."
            for path in "${unmerged[@]}"; do
              git checkout --theirs -- "$path"
              git add -- "$path"
            done

            mapfile -t remaining < <(git diff --name-only --diff-filter=U | sed '/^$/d')
            if (( ${#remaining[@]} > 0 )); then
              printf 'Unresolved merge conflicts remain: %s\n' "$(IFS=', '; echo "${remaining[*]}")" >&2
              exit 1
            fi

            if git rev-parse -q --verify MERGE_HEAD >/dev/null 2>&1; then
              git commit --no-edit
            fi
          }

          git checkout "$TARGET_BRANCH"

          log_sync "Checking current branch"
          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          if [[ "$current_branch" != "$TARGET_BRANCH" ]]; then
            printf 'Current branch is %s. Checkout %s first.\n' "$current_branch" "$TARGET_BRANCH" >&2
            exit 1
          fi

          log_sync "Checking for a clean working tree"
          if [[ -n "$(git status --porcelain)" ]]; then
            printf 'Working tree is not clean. Commit or stash changes first.\n' >&2
            exit 1
          fi

          log_sync "Ensuring upstream remote exists"
          if ! git remote | grep -qx upstream; then
            git remote add upstream "$UPSTREAM_URL"
            log_sync "Added remote upstream -> $UPSTREAM_URL"
          else
            current_upstream="$(git remote get-url upstream)"
            if [[ "$current_upstream" != "$UPSTREAM_URL" ]]; then
              git remote set-url upstream "$UPSTREAM_URL"
              log_sync "Updated remote upstream URL"
            fi
          fi

          log_sync "Fetching upstream"
          git fetch upstream

          log_sync "Capturing pre-merge commit"
          before_sha="$(git rev-parse HEAD)"
          need_push=false
          changed_count=0
          declare -a replacement_targets=()
          declare -A target_map=()
          declare -A renamed_map=()

          log_sync "Merging upstream/$UPSTREAM_BRANCH into $TARGET_BRANCH"
          set +e
          git merge -X theirs "upstream/$UPSTREAM_BRANCH" --no-edit >/tmp/sync-merge.log 2>&1
          merge_exit=$?
          set -e
          if (( merge_exit != 0 )); then
            log_sync "Merge reported conflicts. Attempting known auto-resolution paths."
            resolve_known_merge_conflicts
          fi

          current_head="$(git rev-parse HEAD)"
          if [[ "$current_head" != "$before_sha" ]]; then
            need_push=true
            mapfile -t changed_paths < <(git diff --name-only "$before_sha..HEAD" | sed '/^$/d')
          else
            changed_paths=()
          fi

          if (( ${#changed_paths[@]} == 0 )); then
            log_sync "No upstream file changes detected. Skipping customization pass."
          else
            log_sync "Files changed by upstream merge: ${#changed_paths[@]}"
            log_sync "Applying codex fork customizations to changed files"

            for path in "${changed_paths[@]}"; do
              path="$(normalize_path "$path")"
              if [[ "${path##*/}" == "CLAUDE.md" && -f "$path" ]] && ! is_skipped_path "$path"; then
                if [[ "$path" == */* ]]; then
                  destination="${path%/*}/AGENTS.md"
                else
                  destination="AGENTS.md"
                fi
                mv "$path" "$destination"
                renamed_map["$destination"]=1
                log_customize "Replaced CLAUDE.md with AGENTS.md: $path"
              fi
            done

            for path in "${changed_paths[@]}"; do
              path="$(normalize_path "$path")"
              [[ -f "$path" ]] || continue
              is_skipped_path "$path" && continue
              target_map["$path"]=1
            done

            for path in "${!renamed_map[@]}"; do
              target_map["$path"]=1
            done

            mapfile -t replacement_targets < <(printf '%s\n' "${!target_map[@]}" | sed '/^$/d' | sort -u)
            for path in "${replacement_targets[@]}"; do
              if is_binary_file "$path"; then
                continue
              fi
              if replace_terms_in_file "$path"; then
                changed_count=$((changed_count + 1))
              fi
            done

            readme_changed=false
            for path in "${changed_paths[@]}"; do
              if [[ "$(normalize_path "$path")" == "README.md" ]]; then
                readme_changed=true
                break
              fi
            done

            if [[ "$readme_changed" == true ]]; then
              if ensure_fork_note "README.md"; then
                changed_count=$((changed_count + 1))
              fi
            fi

            log_customize "Customization pass complete. Files changed: $changed_count"
          fi

          assert_repo_safety "${replacement_targets[@]}"

          if [[ -n "$(git status --porcelain)" ]]; then
            log_sync "Customization changes detected. Creating customization commit."
            git add -A
            git commit -m "Apply Codex fork customizations"
            need_push=true
          else
            log_sync "No additional customization changes detected."
          fi

          if [[ "$need_push" == true ]]; then
            git push origin "$TARGET_BRANCH"
            log_sync "Pushed to origin/$TARGET_BRANCH"
          fi

          log_sync "Sync complete."
